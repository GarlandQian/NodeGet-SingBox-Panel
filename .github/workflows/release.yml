name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension package
        run: bun run package

      - name: Write release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## Changed

          - Emits VLESS Reality share URLs in a more compatible TCP Reality format.
          - Emits Mihomo / Clash Meta VLESS Reality proxies in the tested working YAML format.
          - Adds explicit `network: tcp` for TCP VLESS YAML exports.
          - Renames the YAML export menu item to avoid old Clash compatibility confusion.
          NOTES

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              "dist/nodeget-singbox-panel-v${version}.zip" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "dist/nodeget-singbox-panel-v${version}.zip" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
